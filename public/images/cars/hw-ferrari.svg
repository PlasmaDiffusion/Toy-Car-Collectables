  <!-- Prancing horse hood badge -->
  <text x="280" y="95" text-anchor="middle" fill="#c8a020" font-family="sans-serif" font-size="14">🐎</text>
  <!-- Wheels (5-spoke Ferrari) -->
  <circle cx="118" cy="150" r="27" fill="#1a1d27"/>
  <circle cx="118" cy="150" r="23" fill="#1a1a1a"/>
  <circle cx="118" cy="150" r="16" fill="#888"/>
  <!-- 5-spoke -->
  <line x1="118" y1="134" x2="118" y2="166" stroke="#aaa" stroke-width="3"/>
  <line x1="103" y1="150" x2="133" y2="150" stroke="#aaa" stroke-width="3"/>
  <line x1="107" y1="139" x2="129" y2="161" stroke="#aaa" stroke-width="2"/>
  <line x1="129" y1="139" x2="107" y2="161" stroke="#aaa" stroke-width="2"/>
  <circle cx="118" cy="150" r="5" fill="#cc1a1a"/>
  <circle cx="285" cy="150" r="27" fill="#1a1d27"/>
  <circle cx="285" cy="150" r="23" fill="#1a1a1a"/>
  <circle cx="285" cy="150" r="16" fill="#888"/>
  <line x1="285" y1="134" x2="285" y2="166" stroke="#aaa" stroke-width="3"/>
  <line x1="270" y1="150" x2="300" y2="150" stroke="#aaa" stroke-width="3"/>
  <line x1="274" y1="139" x2="296" y2="161" stroke="#aaa" stroke-width="2"/>
  <line x1="296" y1="139" x2="274" y2="161" stroke="#aaa" stroke-width="2"/>
  <circle cx="285" cy="150" r="5" fill="#cc1a1a"/>
  <!-- Headlights -->
  <ellipse cx="340" cy="110" rx="7" ry="5" fill="#ffe88a" opacity="0.95"/>
  <ellipse cx="340" cy="120" rx="5" ry="4" fill="#ffe88a" opacity="0.7"/>
  <!-- Taillights (round) -->
  <circle cx="65" cy="122" r="5" fill="#ff2010"/>
  <circle cx="65" cy="135" r="4" fill="#ff4020"/>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">2003 Ferrari 360 Modena — Hot Wheels 100% Series 1:18</text>
</svg>
