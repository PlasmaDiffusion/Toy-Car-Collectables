<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#1a1d27"/>
  <!-- Gold treasure shimmer background -->
  <radialGradient id="goldGlow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#c8a020" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#1a1d27" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="200" fill="url(#goldGlow)"/>
  <ellipse cx="200" cy="172" rx="155" ry="8" fill="#000" opacity="0.5"/>
  <!-- Classic '67 Camaro first-gen body -->
  <path d="M55,150 L55,118 Q68,86 110,80 L160,76 Q195,62 232,60 L290,63 Q324,68 344,90 L354,120 L354,150 Z" fill="#1a3a8a"/>
  <!-- Flat wide roof -->
  <path d="M110,80 L128,54 Q170,40 232,40 L272,46 L290,63 L232,60 Q195,62 160,76 Z" fill="#152e72"/>
  <!-- Windshield -->
  <path d="M135,56 L155,80 L215,78 L232,52 Z" fill="#88ccee" opacity="0.65"/>
  <!-- Rear window -->
  <path d="M244,50 L260,63 L280,60 L275,48 Z" fill="#88ccee" opacity="0.6"/>
  <!-- RS/SS dual headlights -->
  <circle cx="342" cy="108" r="7" fill="#ffe88a" opacity="0.9"/>
  <circle cx="342" cy="120" r="5" fill="#ffe88a" opacity="0.7"/>
  <!-- Gold Treasure Hunt logo on base (decorative stripe) -->
  <rect x="90" y="148" width="230" height="4" rx="2" fill="#c8a020" opacity="0.8"/>
  <!-- Treasure Hunt flame graphic on side -->
  <path d="M180,100 Q190,80 200,90 Q210,75 220,88 Q215,95 210,100 Z" fill="#c8a020" opacity="0.7"/>
  <!-- Wheels (Real Riders look) -->
  <circle cx="118" cy="150" r="28" fill="#1a1d27"/>
  <circle cx="118" cy="150" r="24" fill="#1a1a1a"/>
  <circle cx="118" cy="150" r="17" fill="#888"/>
  <!-- "Real Rider" rubber tyre bead -->
  <circle cx="118" cy="150" r="22" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="118" cy="150" r="7" fill="#c8a020"/>
  <circle cx="292" cy="150" r="28" fill="#1a1d27"/>
  <circle cx="292" cy="150" r="24" fill="#1a1a1a"/>
  <circle cx="292" cy="150" r="17" fill="#888"/>
  <circle cx="292" cy="150" r="22" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="292" cy="150" r="7" fill="#c8a020"/>
  <!-- Taillights (full-width) -->
  <rect x="53" y="115" width="7" height="25" rx="2" fill="#ff2010"/>
  <!-- Treasure Hunt badge (corner) -->
  <polygon points="348,42 370,42 370,64" fill="#c8a020" opacity="0.9"/>
  <text x="362" y="58" fill="#1a1d27" font-family="sans-serif" font-size="7" font-weight="bold">TH</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">1995 Hot Wheels Treasure Hunt '67 Camaro — #9/12</text>
</svg>
