<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#1a1d27"/>
  <ellipse cx="200" cy="172" rx="158" ry="8" fill="#000" opacity="0.5"/>
  <!-- Toronado — very long, dramatic front-wheel-drive coupe -->
  <path d="M45,150 L45,118 Q58,86 100,80 L152,76 Q188,62 230,60 L298,63 Q335,68 358,92 L368,120 L368,150 Z" fill="#6a2a8a"/>
  <!-- Fastback roof sweeping into trunk -->
  <path d="M100,80 L118,52 Q165,38 230,38 L275,44 L298,63 L230,60 Q188,62 152,76 Z" fill="#521e6e"/>
  <!-- Windshield -->
  <path d="M126,54 L148,80 L212,78 L233,52 Z" fill="#88ccee" opacity="0.65"/>
  <!-- Rear sail panel (opera window) -->
  <ellipse cx="268" cy="68" rx="12" ry="8" fill="#88ccee" opacity="0.5"/>
  <!-- Very long hood ornament line -->
  <line x1="300" y1="82" x2="360" y2="90" stroke="#9a5ab0" stroke-width="2"/>
  <!-- Torpedo-style fender tips -->
  <path d="M345,88 Q370,92 368,120 L345,115 Z" fill="#7a3a9a"/>
  <!-- Wheels (unique front-drive placement) -->
  <circle cx="130" cy="150" r="27" fill="#1a1d27"/>
  <circle cx="130" cy="150" r="23" fill="#2a2a2a"/>
  <circle cx="130" cy="150" r="15" fill="#8855aa"/>
  <circle cx="130" cy="150" r="6" fill="#aa88cc"/>
  <circle cx="305" cy="150" r="27" fill="#1a1d27"/>
  <circle cx="305" cy="150" r="23" fill="#2a2a2a"/>
  <circle cx="305" cy="150" r="15" fill="#8855aa"/>
  <circle cx="305" cy="150" r="6" fill="#aa88cc"/>
  <!-- Headlights (hidden / vacuum operated) -->
  <rect x="358" y="108" width="12" height="8" rx="2" fill="#ffe88a" opacity="0.9"/>
  <!-- Taillights (full-width signature) -->
  <rect x="43" y="114" width="7" height="26" rx="2" fill="#ff2010"/>
  <!-- Johnny Lightning logo text (base) -->
  <text x="200" y="148" text-anchor="middle" fill="#aa88cc" font-family="sans-serif" font-size="8" opacity="0.5">JOHNNY LIGHTNING</text>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">1968 Oldsmobile Toronado — Johnny Lightning Custom</text>
</svg>
