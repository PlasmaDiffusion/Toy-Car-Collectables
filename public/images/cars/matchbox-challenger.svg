<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#1a1d27"/>
  <ellipse cx="200" cy="172" rx="155" ry="8" fill="#000" opacity="0.5"/>
  <!-- Wide muscular body -->
  <path d="M52,150 L52,118 Q66,86 108,80 L158,76 Q192,64 230,62 L288,65 Q322,70 342,92 L352,120 L352,150 Z" fill="#cc2222"/>
  <!-- Flat-deck roof (pony car style) -->
  <path d="M108,80 L125,55 Q168,42 230,42 L272,48 L288,65 L230,62 Q192,64 158,76 Z" fill="#aa1818"/>
  <!-- Windshield -->
  <path d="M132,57 L152,80 L210,78 L232,55 Z" fill="#88ccee" opacity="0.65"/>
  <!-- Rear window (small fastback) -->
  <path d="M244,52 L260,64 L280,62 L275,50 Z" fill="#88ccee" opacity="0.6"/>
  <!-- Side windows -->
  <path d="M156,78 L168,62 L242,58 L252,68 L248,78 Z" fill="#88ccee" opacity="0.5"/>
  <!-- Hood scoop -->
  <rect x="238" y="70" width="30" height="12" rx="3" fill="#aa1818"/>
  <rect x="243" y="72" width="20" height="8" rx="2" fill="#880c0c"/>
  <!-- Wheels (wide Goodyear style) -->
  <circle cx="118" cy="150" r="29" fill="#1a1d27"/>
  <circle cx="118" cy="150" r="25" fill="#1a1a1a"/>
  <circle cx="118" cy="150" r="17" fill="#aaa"/>
  <circle cx="118" cy="150" r="9" fill="#ccc"/>
  <circle cx="293" cy="150" r="29" fill="#1a1d27"/>
  <circle cx="293" cy="150" r="25" fill="#1a1a1a"/>
  <circle cx="293" cy="150" r="17" fill="#aaa"/>
  <circle cx="293" cy="150" r="9" fill="#ccc"/>
  <!-- Headlights (quad hidden) -->
  <rect x="344" y="112" width="10" height="5" rx="1" fill="#ffe88a" opacity="0.9"/>
  <rect x="344" y="120" width="10" height="5" rx="1" fill="#ffe88a" opacity="0.7"/>
  <!-- Taillights (full-width bar) -->
  <rect x="50" y="115" width="7" height="25" rx="2" fill="#ff2010"/>
  <!-- Bumper -->
  <path d="M52,118 Q46,135 52,150" stroke="#aaa" stroke-width="3" fill="none"/>
  <text x="200" y="192" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">1970 Dodge Challenger — Matchbox Superfast #1</text>
</svg>
